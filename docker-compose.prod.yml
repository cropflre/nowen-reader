# ============================================================
# NowenReader - 生产部署（使用 Docker Hub 镜像）
#
# 服务器上使用此文件：
#   docker compose -f docker-compose.prod.yml up -d
#
# 或复制为 docker-compose.yml 后直接：
#   docker compose up -d
#
# 更新镜像：
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
# ============================================================

services:
  nowen-reader:
    image: cropflre/nowen-reader:latest
    container_name: nowen-reader
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - nowen-data:/data
      - nowen-comics:/app/comics
      # 挂载本地目录（取消注释并修改路径）
      # - /path/to/your/comics:/app/comics
      - nowen-cache:/app/.cache
    environment:
      - GIN_MODE=release
      - DATABASE_URL=/data/nowen-reader.db
      - COMICS_DIR=/app/comics
      - DATA_DIR=/app/.cache
      - PORT=3000
      - TZ=Asia/Shanghai

volumes:
  nowen-data:
    name: nowen-reader-data
  nowen-comics:
    name: nowen-reader-comics
  nowen-cache:
    name: nowen-reader-cache
